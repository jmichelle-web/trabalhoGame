<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de Jogos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Jogos</h1>
        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Jogos</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="games">
            <h2>Jogos Populares</h2>
            <div class="game-cards">
                <div class="game-card">
                    <img src="https://via.placeholder.com/150" alt="Jogo 1">
                    <h3>Jogo 1</h3>
                    <p>Descrição divertida do Jogo 1.</p>
                    <button>Jogar Agora</button>
                </div>
                <div class="game-card">
                    <img src="https://via.placeholder.com/150" alt="Jogo 2">
                    <h3>Jogo 2</h3>
                    <p>Descrição divertida do Jogo 2.</p>
                    <button>Jogar Agora</button>
                </div>
                <div class="game-card">
                    <img src="https://via.placeholder.com/150" alt="Jogo 3">
                    <h3>Jogo 3</h3>
                    <p>Descrição divertida do Jogo 3.</p>
                    <button>Jogar Agora</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Portal de Jogos. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
